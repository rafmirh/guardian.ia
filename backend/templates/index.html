<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PP701 g4</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body>
    <div id="flash-effect"></div>
    <div class="main-container">
        <div class="centered">
            <span class="letter" style="--i:0">U</span>
            <span class="letter" style="--i:1">N</span>
            <span class="letter" style="--i:2">R</span>
            <span class="letter" style="--i:3">C</span>
        </div>
        <div class="proyecto">
            <p>PHLCDN MAC 701 equipo 4</p>
            <p>Uso de IA en robo de identidad en redes sociales</p>
        </div>
        <div class="names">
            <p>- Raúl Campero Espinosa</p>
            <p>- Maximiliano García Martínez</p>
            <p>- José Rafael Miranda Hernández</p>
            <p>- Manuel Nápoles Romero</p>
        </div>
    </div>
    
    <script>
        document.body.addEventListener('click', function() {
            const flashEffect = document.getElementById('flash-effect');
            flashEffect.classList.add('active');
            
            // Configuración de los flashes GameBoy (típicamente 3-4 flashes rápidos)
            let flashCount = 0;
            const maxFlashes = 3;
            
            const flashInterval = setInterval(function() {
                flashCount++;
                if (flashCount % 2 === 1) {
                    flashEffect.style.opacity = '1';
                } else {
                    flashEffect.style.opacity = '0';
                }
                
                if (flashCount >= maxFlashes * 2) {
                    clearInterval(flashInterval);
                    // Redireccionar después de completar los flashes
                    window.location.href = '/content';
                }
            }, 100); // 100ms entre cada cambio para un efecto rápido de flash
            
            return false; // Prevenir cualquier otro evento de clic
        });
    </script>
</body>
</html>
